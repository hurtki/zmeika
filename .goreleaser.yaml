version: 2
project_name: ascii-snake
builds:
  - id: default
    main: ./cmd/client/main.go
    binary: ascii-snake
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
archives:
  - format: binary
    name_template: "ascii-snake-{{ .Os }}-{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
release:
  github:
    owner: hurtki
    name: zmeika
